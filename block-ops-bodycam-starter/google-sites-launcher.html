<div id="blockOpsLauncher">
  <div class="bo-card">
    <h1>BLOCK OPS</h1>
    <p>Opens the game in a clean blank tab. Replace GAME_URL with your GitHub Pages URL.</p>
    <button id="openBlockOps">PLAY BLOCK OPS</button>
  </div>
</div>

<style>
  #blockOpsLauncher {
    min-height: 360px;
    display: grid;
    place-items: center;
    border-radius: 22px;
    color: white;
    background: linear-gradient(135deg, #07101d, #17361f);
    font-family: Arial, sans-serif;
  }
  .bo-card {
    width: min(560px, 92%);
    text-align: center;
    padding: 34px;
    border-radius: 22px;
    background: rgba(0,0,0,.45);
    border: 1px solid rgba(255,255,255,.18);
    box-shadow: 0 22px 70px rgba(0,0,0,.45);
  }
  .bo-card h1 { margin: 0; font-size: 56px; }
  .bo-card p { color: rgba(255,255,255,.78); }
  #openBlockOps {
    cursor: pointer;
    border: 0;
    border-radius: 999px;
    padding: 16px 30px;
    color: white;
    font-size: 20px;
    font-weight: 900;
    background: linear-gradient(135deg, #286fff, #8a45ff);
  }
</style>

<script>
  document.getElementById("openBlockOps").onclick = function () {
    var GAME_URL = "https://YOUR-GITHUB-USERNAME.github.io/block-ops-bodycam/";
    var w = window.open("about:blank", "BlockOpsBodycam");
    if (!w) {
      alert("Pop-up blocked. Allow pop-ups, then click PLAY again.");
      return;
    }
    w.document.open();
    w.document.write(`<!doctype html>
<html>
<head>
  <title>Block Ops</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}
    iframe{border:0;width:100vw;height:100vh;display:block}
  </style>
</head>
<body>
  <iframe src="${GAME_URL}" allow="fullscreen; gamepad; pointer-lock; autoplay"></iframe>
</body>
</html>`);
    w.document.close();
    w.focus();
  };
</script>
